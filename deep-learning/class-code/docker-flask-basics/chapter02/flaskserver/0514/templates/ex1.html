<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Basic: system + user Test</title>
</head>
<body>
<h3>① Basic: system + user</h3>

<label>System:</label><br>
<textarea id="system" rows="3" cols="60" placeholder="예) 너는 친절한 선생님이야."></textarea><br><br>

<label>User:</label><br>
<textarea id="user" rows="3" cols="60" placeholder="예) 파이썬이 뭐야?"></textarea><br><br>

<button id="run">Run</button>
<pre id="out"></pre>

<script>
document.getElementById("run").onclick = async () => {
  const sys = document.getElementById("system").value.trim();
  const usr = document.getElementById("user").value.trim();
  const out = document.getElementById("out");
  if (!usr) return alert("User 메시지를 입력하세요.");

  const messages = [];
  if (sys) messages.push({ role: "system", content: sys });
  messages.push({ role: "user", content: usr });

  const payload = { model: "gemma4:e2b", stream: false, messages };
  out.textContent = "요청 중...";

  try {
    const res = await fetch("http://192.168.24.186:11434/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    
    const data = await res.json();
    out.textContent = data.message?.content || JSON.stringify(data, null, 2);
  } catch (e) {
    out.textContent = e;
  }
};
</script>
</body>
</html>
