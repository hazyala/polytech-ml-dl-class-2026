<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>⑧ Self-Summary: 요약 삽입 유도</title>
</head>
<body>
<h3>⑧ Self-Summary (요약 재주입)</h3>

<label>System (선택):</label><br>
<textarea id="sys" rows="2" cols="70" placeholder="예) 너는 친절한 고양이야. 모든 문장은 '냥'으로 끝내."></textarea><br><br>

<label>User:</label><br>
<textarea id="user" rows="2" cols="70" placeholder="예) 오늘 뭐할거야?"></textarea><br><br>

<label><input type="checkbox" id="sumAsSystem" checked> 요약을 system으로 재주입 (끄면 assistant로 주입)</label><br><br>

<button id="send">Send</button>
<button id="summarize">Summarize & Inject</button>
<button id="reset">Reset</button>
<pre id="out"></pre>

<script>
const out = document.getElementById("out");
const sysEl = document.getElementById("sys");
const userEl = document.getElementById("user");
const sumAsSystemEl = document.getElementById("sumAsSystem");

let history = [];
let systemInjected = false;

async function callOllama(messages) {
  const payload = { model: "gemma3:4b", stream: false, messages };
  const res = await fetch("http://GPUIP:11434/api/chat", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  return data.message?.content || JSON.stringify(data, null, 2);
}

document.getElementById("send").onclick = async () => {
  const u = userEl.value.trim();
  if (!u) return alert("User 메시지를 입력하세요.");
  if (!systemInjected) {
    const s = sysEl.value.trim();
    if (s) history.push({ role: "system", content: s });
    systemInjected = true;
  }
  history.push({ role: "user", content: u });

  out.textContent = "요청 중...";
  try {
    const answer = await callOllama(history);
    history.push({ role: "assistant", content: answer });
    out.textContent = `👤 ${u}\n\n🤖 ${answer}\n\n— turns: ${history.length}`;
    userEl.value = "";
    userEl.focus();
  } catch (e) { out.textContent = String(e); }
};

document.getElementById("summarize").onclick = async () => {
  if (history.length === 0 && !sysEl.value.trim()) {
    return alert("요약할 히스토리가 없습니다. 먼저 Send로 한 턴 이상 대화하세요.");
  }
  // 최초 1회 system 주입
  if (!systemInjected) {
    const s = sysEl.value.trim();
    if (s) history.push({ role: "system", content: s });
    systemInjected = true;
  }

  // 요약 요청 메시지(메타 프롬프트)
  const summarizer = [
    ...history,
    { role: "user", content:
      "지금까지의 대화를 5줄 이내 불릿으로 한국어 요약해줘. " +
      "핵심만 간결히, 작성 규칙: \n- '요약:' 제목 후 불릿 3~5개\n- 새 정보/계획/제약 우선\n- 불필요한 감탄/이모지 금지" }
  ];

  out.textContent = "요약 생성 중...";
  try {
    const summary = await callOllama(summarizer);

    // 요약을 system 또는 assistant로 재주입
    const role = sumAsSystemEl.checked ? "system" : "assistant";
    const injected = `대화 자기요약(모델 생성):\n${summary}\n\n이 자기요약을 이후 답변의 맥락 기준으로 사용한다.`;
    history.push({ role, content: injected });

    out.textContent = `✅ 요약을 ${role.toUpperCase()}로 재주입했습니다.\n\n${injected}\n\n— turns: ${history.length}`;
  } catch (e) { out.textContent = String(e); }
};

document.getElementById("reset").onclick = () => {
  history = []; systemInjected = false; out.textContent = "history cleared.";
};

// 샘플 프리셋
sysEl.value = "너는 다정한 고양이 조언자야. 모든 문장은 '냥'으로 끝내.";
userEl.value = "오늘 뭐할거야?";
</script>
</body>
</html>
