<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apache Web Server Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: #ffffff;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 500px;
            width: 90%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }
        h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 15px;
            color: #1d1d1f;
            letter-spacing: -0.02em;
        }
        h2 {
            font-size: 1.3em;
            font-weight: 500;
            margin-bottom: 25px;
            color: #1d1d1f;
            letter-spacing: -0.01em;
        }
        h3 {
            font-size: 1.1em;
            font-weight: 400;
            margin-bottom: 35px;
            color: #1d1d1f;
            font-style: normal;
        }
        p {
            font-size: 1em;
            line-height: 1.6;
            color: #86868b;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello, Apache2</h1>
        <h2>Welcome to my web!</h2>
        <h3>- Heamin -</h3>
        <p>This is a simple test page for the Apache web server.</p>
    </div>
</body>
</html>
